name: Deploy Voicebox to VPS

on:
  push:
    branches: [deploy]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 300s
          envs: GHCR_PULL_TOKEN,DEPLOY_PATH
          script: |
            set -euo pipefail
            TARGET="${DEPLOY_PATH:-/var/www/voicebox}"
            cd "$TARGET"
            if [ -n "${GHCR_PULL_TOKEN:-}" ]; then
              echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
            fi
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            # Repair volume ownership (idempotent; helps stale root-owned HF cache from older runs)
            docker compose -f docker-compose.prod.yml exec -T -u root voicebox \
              chown -R voicebox:voicebox /home/voicebox/.cache/huggingface /app/data
            docker compose -f docker-compose.prod.yml exec -T -u root voicebox \
              ls -ldn /home/voicebox/.cache/huggingface /app/data
